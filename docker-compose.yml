services:
  hackernews.api:
    image: ${DOCKER_REGISTRY-}hackernewsapi
    build:
      context: .
      dockerfile: HackerNews.API/Dockerfile
    ports:
      - "8080:8080"
      - "8081:8081"
    depends_on:
      - redis

  hackernews.syncworker:
    image: ${DOCKER_REGISTRY-}hackernewssyncworker
    build:
      context: .
      dockerfile: HackerNews.SyncWorker/Dockerfile
    depends_on:
      - redis

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password